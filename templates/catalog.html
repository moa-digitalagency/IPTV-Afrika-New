<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogue complet - Mon IPTV Africa">
    <title>Catalogue Complet - Mon IPTV Africa</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['Cormorant', 'Georgia', 'serif'],
                        'sans': ['Montserrat', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../statics/css/style.css">
    <link rel="stylesheet" href="../statics/css/catalog.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex items-center justify-between mb-6">
                <a href="/" class="font-serif text-2xl font-bold gold-gradient-text">Mon IPTV Africa</a>
                <a href="/" class="text-sm px-4 py-2 rounded text-gray-300 hover:text-gold transition">← Retour</a>
            </div>
            <div class="text-center mb-6">
                <h1 class="font-serif text-4xl lg:text-5xl font-bold mb-2">
                    <span style="color: var(--text-primary);">Explorer </span><span class="gold-gradient-text italic">Toutes les Chaînes</span>
                </h1>
                <p class="font-sans text-lg" style="color: var(--text-muted);">Accédez à plus de 26 000 chaînes africaines et internationales dans 485 régions du monde</p>
            </div>
            <div style="margin-top: 1.5rem;">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Rechercher une région...">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div id="countriesContainer">
            <div class="text-center text-gray-500">
                <p>Chargement des régions...</p>
            </div>
        </div>
    </main>

    <!-- Channels Modal -->
    <div id="channelsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);">
        <div class="glass-surface rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-hidden flex flex-col" style="border: 1px solid var(--border-gold);">
            <!-- Modal Header -->
            <div class="p-6 border-b" style="border-color: var(--border-gold);">
                <div class="flex items-center justify-between">
                    <h3 id="modalCountryName" class="font-serif text-2xl font-bold" style="color: var(--gold);"></h3>
                    <button onclick="closeChannelsModal()" class="text-2xl leading-none" style="color: var(--text-muted);">✕</button>
                </div>
                <p id="modalChannelCount" class="font-sans text-sm mt-2" style="color: var(--text-muted);"></p>
            </div>

            <!-- Modal Body (Scrollable) -->
            <div id="modalChannelsList" class="overflow-y-auto flex-1 p-6">
                <!-- Channels will be loaded here -->
            </div>

            <!-- Modal Footer -->
            <div class="p-4 border-t text-center" style="border-color: var(--border-gold);">
                <button onclick="closeChannelsModal()" class="font-sans text-sm px-6 py-2 rounded-lg" style="background: var(--gold); color: var(--bg);">Fermer</button>
            </div>
        </div>
    </div>

    <script src="../statics/js/catalog.js"></script>
</body>
</html>
